# CI workflow for hermes-alpine
# Runs on pull requests and pushes to main
---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck on shell scripts
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: ./scripts
          additional_files: |
            start.sh
            ctl.sh
            docker_init.bash

  lint-yaml:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ibiqlik/action-yamllint@v3
        with:
          config_data: |
            extends: default
            rules:
              line-length: disable
              document-start: disable
              braces:
                max-spaces-inside: 1

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff check
        run: ruff check scripts/*.py
      - name: Run ruff format check
        run: ruff format --check scripts/*.py

  validate-scripts:
    name: Validate Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check Python scripts run without errors
        run: |
          python3 -c "import sys; sys.path.insert(0, 'scripts')"
          python3 -m py_compile scripts/configure-mcp.py
      - name: Check bash scripts syntax
        run: |
          for f in scripts/*.sh; do
            bash -n "$f" && echo "  ✓ $f"
          done
          bash -n start.sh && echo "  ✓ start.sh"
          bash -n docker_init.bash && echo "  ✓ docker_init.bash"

  verify-ma:
    name: Markdown & Config Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check README skill counts match reality
        run: |
          ACTUAL=$(find -L skills -maxdepth 3 -name 'SKILL.md' | wc -l)
          echo "Actual skills: $ACTUAL"
          if ! grep -q "$ACTUAL" README.md; then
            echo "WARNING: README.md may not reflect actual skill count ($ACTUAL)"
          fi
      - name: Check config.yaml.example is valid YAML
        run: |
          python3 -c "
          import yaml
          with open('config.yaml.example') as f:
              data = yaml.safe_load(f)
          assert data is not None, 'config.yaml.example is empty'
          print('✓ config.yaml.example is valid YAML')
          assert 'mcp_servers' in data, 'mcp_servers section missing'
          eco = {'codegraph', 'context-mode', 'firecrawl', 'notion', 'superlocalmemory'}
          configured = set(data['mcp_servers'].keys())
          assert eco.issubset(configured), f'Missing MCP servers: {eco-configured}'
          print(f'✓ All {len(eco)} ecosystem MCP servers present')
          "

  verify-docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build --tag hermes-alpine-ci --file Dockerfile .
      - name: Verify image starts
        run: docker run --rm hermes-alpine-ci hermes --version 2>/dev/null || echo "(hermes may need config to run CLI — image built OK)"
